<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collaborative Digital Blackboard Workspace</title>
    <script src="https://cdn.jsdelivr.net/npm/@unocss/runtime"></script>
    <style>
        .board-bg {
            background-color: #121824;
            background-image: radial-gradient(#1e293b 2px, transparent 2px);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="board-bg min-h-screen text-slate-100 font-sans p-6">

    <header class="max-w-7xl mx-auto mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-slate-800/60 backdrop-blur-md p-6 rounded-2xl border border-slate-700/50 shadow-xl">
        <div>
            <h1 class="text-3xl font-black tracking-tight text-white mb-1">
                Live Collaborative Blackboard
            </h1>
            <p class="text-slate-400 text-sm">
                Active Virtual Board Metadata: Total Static Render Count Includes <span class="text-amber-400 font-bold font-mono">{{ notesCount }}</span> Historical Base Item Instances.
            </p>
        </div>
        
        <div class="flex flex-wrap gap-3 w-full md:w-auto">
            <input type="text" id="authorInput" placeholder="Your Profile Alias" class="bg-slate-900/90 border border-slate-600 px-4 py-2.5 rounded-xl text-sm text-white placeholder-slate-500 focus:outline-none focus:border-amber-400 focus:ring-1 focus:ring-amber-400 w-full sm:w-44 transition">
            <input type="text" id="titleInput" placeholder="Sticky Card Title..." class="bg-slate-900/90 border border-slate-600 px-4 py-2.5 rounded-xl text-sm text-white placeholder-slate-500 focus:outline-none focus:border-amber-400 focus:ring-1 focus:ring-amber-400 flex-1 sm:flex-initial transition">
            <textarea id="contentInput" placeholder="Note body content context..." class="bg-slate-900/90 border border-slate-600 px-4 py-2.5 rounded-xl text-sm text-white placeholder-slate-500 focus:outline-none focus:border-amber-400 focus:ring-1 focus:ring-amber-400 w-full sm:w-64 h-11 resize-none transition"></textarea>
            
            <div class="flex items-center gap-2 bg-slate-900/50 p-1.5 rounded-xl border border-slate-700">
                <input type="color" id="colorInput" value="#fef08a" class="w-8 h-8 rounded-lg cursor-pointer border-none bg-transparent">
            </div>

            <button onclick="createNewNote()" class="bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-400 hover:to-amber-500 text-slate-950 font-bold px-5 py-2.5 rounded-xl text-sm shadow-lg shadow-amber-500/20 active:scale-98 transition transform duration-150">
                Pin Note
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto">
        <div id="blackboardGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
    </main>

    <script>
        let ws;
        
        function initWebSocket() {
            const proto = window.location.protocol === "https:" ? "wss:" : "ws:";
            ws = new WebSocket(`${proto}//${window.location.host}`);
            
            ws.onmessage = (event) => {
                const parsed = JSON.parse(event.data);
                if (parsed.event === "sync_update") {
                    loadNotesCollection();
                }
            };
            
            ws.onclose = () => {
                setTimeout(initWebSocket, 3000);
            };
        }

        async function loadNotesCollection() {
            try {
                const response = await fetch('/api/notes');
                const notes = await response.json();
                const container = document.getElementById('blackboardGrid');
                container.innerHTML = '';
                
                notes.forEach(note => {
                    const card = document.createElement('div');
                    card.className = "relative p-6 rounded-2xl shadow-xl border transition duration-300 hover:-translate-y-1 transform flex flex-col justify-between min-h-[200px]";
                    card.style.backgroundColor = note.color || "#fef08a";
                    card.style.borderColor = "rgba(0,0,0,0.08)";
                    
                    const brightness = getRgbBrightness(note.color || "#fef08a");
                    const textColorClass = brightness > 150 ? "text-slate-900" : "text-white";
                    const mutedColorClass = brightness > 150 ? "text-slate-700" : "text-slate-300";
                    const btnBgClass = brightness > 150 ? "bg-black/5 hover:bg-black/10" : "bg-white/10 hover:bg-white/20";

                    card.innerHTML = `
                        <div>
                            <div class="flex justify-between items-start gap-2 mb-3">
                                <h3 class="font-black text-xl leading-snug ${textColorClass}">${escapeHtml(note.title)}</h3>
                                <button onclick="deleteNoteInstance('${note.id}')" class="p-1.5 rounded-lg ${btnBgClass} ${textColorClass} transition flex items-center justify-center">
                                    <div class="i-radial-line w-4 h-4 text-current font-bold font-sans">×</div>
                                </button>
                            </div>
                            <p class="text-sm font-medium whitespace-pre-wrap mb-4 ${mutedColorClass}">${escapeHtml(note.content || '')}</p>
                        </div>
                        <div class="flex justify-between items-center border-t border-black/5 pt-3 mt-auto">
                            <span class="text-xs tracking-wider font-bold uppercase opacity-70 ${textColorClass}">@${escapeHtml(note.author)}</span>
                            <span class="text-[10px] font-mono opacity-50 ${textColorClass}">${new Date(note.createdAt).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                console.error("Failed to render notes matrix profile collection:", err);
            }
        }

        async function createNewNote() {
            const titleEl = document.getElementById('titleInput');
            const contentEl = document.getElementById('contentInput');
            const authorEl = document.getElementById('authorInput');
            const colorEl = document.getElementById('colorInput');

            if (!titleEl.value.trim() || !authorEl.value.trim()) {
                alert("Please provide both a Title and Profile Author identity alias to compile card.");
                return;
            }

            const payload = {
                title: titleEl.value.trim(),
                content: contentEl.value.trim(),
                author: authorEl.value.trim(),
                color: colorEl.value
            };

            try {
                const res = await fetch('/api/notes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await res.json();
                if (result.success) {
                    titleEl.value = '';
                    contentEl.value = '';
                    loadNotesCollection();
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send("mutation_post_action");
                    }
                }
            } catch (err) {
                console.error("Network write rejected:", err);
            }
        }

        async function deleteNoteInstance(id) {
            try {
                const res = await fetch(`/api/notes/${id}`, { method: 'DELETE' });
                const result = await res.json();
                if (result.success) {
                    loadNotesCollection();
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send("mutation_delete_action");
                    }
                }
            } catch (err) {
                console.error("Network deletion rejected:", err);
            }
        }

        function getRgbBrightness(hexString) {
            const c = hexString.substring(1);
            const rgb = parseInt(c, 16);
            const r = (rgb >> 16) & 0xff;
            const g = (rgb >> 8) & 0xff;
            const b = (rgb >> 0) & 0xff;
            return 0.2126 * r + 0.7152 * g + 0.0722 * b;
        }

        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        window.addEventListener('DOMContentLoaded', () => {
            loadNotesCollection();
            initWebSocket();
        });
    </script>
</body>
</html>
