<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ title }}</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 30px auto; padding: 0 20px; background-color: #f8fafc; }
    nav { display: flex; gap: 15px; background: #fff; padding: 15px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #e2e8f0; }
    nav a { color: #2563eb; font-weight: 600; text-decoration: none; }
    form { background: #fff; padding: 25px; border-radius: 8px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; gap: 15px; }
    input, button { padding: 10px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 1rem; }
    button { background: #2563eb; color: white; font-weight: bold; cursor: pointer; border: none; }
  </style>
</head>
<body>

  <nav>
    <a href="/">Dashboard</a>
    <a href="/add-product">Add Product</a>
    <a href="/checkout">Checkout Calculator</a>
    <a href="/analytics">Analytics & Reports</a>
  </nav>

  <h1>Add Product to Shop</h1>

  <form action="/add-product" method="POST">
    <label>Product Name</label>
    <input type="text" name="name" required />

    <label>Category</label>
    <input type="text" name="category" placeholder="Electronics, Apparel, etc." required />

    <label>Cost Price ($)</label>
    <input type="number" step="0.01" name="costPrice" required />

    <label>Selling Price ($)</label>
    <input type="number" step="0.01" name="sellPrice" required />

    <label>Initial Stock Quantity</label>
    <input type="number" name="stock" required />

    <button type="submit">Add and Perform Inventory Calculations</button>
  </form>

</body>
</html>
