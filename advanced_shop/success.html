<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ title }}</title>
  <style>
    body { font-family: system-ui, sans-serif; text-align: center; padding: 60px 20px; background-color: #f8fafc; }
    .card { max-width: 400px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; border: 1px solid #e2e8f0; }
    a { display: inline-block; margin-top: 15px; color: #2563eb; font-weight: bold; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Action Complete!</h2>
    <p>{{ message }}</p>
    <a href="/">Return to Main Dashboard</a>
  </div>
</body>
</html>
