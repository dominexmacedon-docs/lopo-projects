<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Feed</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; }
    .card { border: 1px solid #ddd; padding: 15px; border-radius: 6px; margin-bottom: 15px; background: #fff; }
    form { display: flex; flex-direction: column; gap: 10px; }
    input, textarea { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; }
    button { padding: 10px 15px; background: #0070f3; color: white; border: none; border-radius: 4px; cursor: pointer; }
    .post-author { font-size: 0.85em; color: #666; font-weight: bold; }
    .logout-btn { background: #dc3545; text-decoration: none; padding: 6px 12px; border-radius: 4px; color: white; font-size: 0.9em; }
    .post-image { max-width: 100%; border-radius: 6px; margin-top: 10px; display: block; }
  </style>
</head>
<body>

  <header>
    <h2>Welcome, {{ user }}!</h2>
    <a href="/logout" class="logout-btn">Logout</a>
  </header>

  <h3 style="margin-top: 20px;">Create New Post</h3>
  <div class="card">
    <form onsubmit="submitPost(event)">
      <input type="text" id="postTitle" placeholder="Post Title" required />
      <textarea id="postContent" rows="3" placeholder="What's on your mind?" required></textarea>
      <input type="file" id="postImage" accept="image/*" />
      <button type="submit">Publish Post</button>
    </form>
  </div>

  <h3>Feed</h3>
  <div id="postsContainer"></div>

  <script>
    let rawPosts = '{{ posts }}';
    let posts = [];

    try {
      posts = JSON.parse(rawPosts);
    } catch (e) {
      posts = [];
    }

    function renderPosts() {
      let container = document.getElementById('postsContainer');
      if (!posts || posts.length === 0) {
        container.innerHTML = '<p style="color: #888;">No posts yet. Be the first to share something!</p>';
        return;
      }

      container.innerHTML = posts.reverse().map(p => `
        <div class="card">
          <div class="post-author">${p.author || 'Anonymous'}</div>
          <h4 style="margin: 5px 0;">${p.title}</h4>
          <p style="margin: 0; color: #333;">${p.content}</p>
          ${p.image ? `<img src="${p.image}" class="post-image" alt="Post Attachment" />` : ''}
        </div>
      `).join('');
    }

    async function submitPost(event) {
      event.preventDefault();
      let title = document.getElementById('postTitle').value;
      let content = document.getElementById('postContent').value;
      let fileInput = document.getElementById('postImage');

      let formData = new FormData();
      formData.append('title', title);
      formData.append('content', content);
      
      if (fileInput.files.length > 0) {
        formData.append('image', fileInput.files[0]);
      }

      let res = await fetch('/post', {
        method: 'POST',
        body: formData
      });
      let data = await res.json();

      if (data.success) {
        window.location.reload();
      } else {
        alert(data.message || 'Failed to submit post');
      }
    }

    renderPosts();
  </script>
</body>
</html>
