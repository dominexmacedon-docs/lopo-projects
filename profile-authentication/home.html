<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; margin: 40px; }
        .profile-card { background: white; padding: 30px; border-radius: 8px; max-width: 400px; margin: 0 auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { margin-top: 0; color: #333; }
        p { color: #666; font-size: 1.1em; }
        .btn-logout { display: inline-block; margin-top: 20px; padding: 10px 15px; background-color: #dc3545; color: white; text-decoration: none; border-radius: 4px; }
        .btn-logout:hover { background-color: #c82333; }
    </style>
</head>
<body>

<div class="profile-card">
    <h1>Welcome, {{ userName }}!</h1>
    <p><strong>Email:</strong> {{ currentUser }}</p>
    <a href="/logout" class="btn-logout">Logout</a>
</div>

</body>
</html>
