<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lopo REST Engine</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fdfdfd; color: #333; margin: 0; padding: 2rem; display: flex; justify-content: center; }
        .app-wrapper { width: 100%; max-width: 500px; background: #fff; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid #eaeaea; }
        h1 { font-size: 1.5rem; margin-top: 0; font-weight: 700; color: #111; }
        .input-group { display: flex; gap: 10px; margin-bottom: 1.5rem; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.95rem; }
        button { background: #000; color: #fff; border: none; padding: 0 20px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        button:hover { opacity: 0.85; }
        ul { list-style: none; padding: 0; margin: 0; }
        li { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid #f0f0f0; }
        .task-content { display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
        .completed { text-decoration: line-through; color: #888; }
        .delete-btn { background: none; color: #ff3b30; padding: 4px 8px; font-size: 0.85rem; font-weight: normal; }
        .delete-btn:hover { background: #fff1f0; }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <h1>Task Ledger (JSON API)</h1>
        
        <div class="input-group">
            <input type="text" id="taskTitle" placeholder="What needs to be done?">
            <button onclick="addTask()">Add Task</button>
        </div>

        <ul id="taskList"></ul>
    </div>

    <script>
        // Lifecycle Hook: Load initial list data from backend
        document.addEventListener("DOMContentLoaded", fetchTasks);

        async function fetchTasks() {
            const res = await fetch('/api/tasks');
            const tasks = await res.json();
            const list = document.getElementById('taskList');
            list.innerHTML = '';
            
            tasks.forEach(task => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <div class="task-content ${task.completed ? 'completed' : ''}" onclick="toggleTask('${task.id}')">
                        <input type="checkbox" ${task.completed ? 'checked' : ''} style="pointer-events: none;">
                        <span>${task.title}</span>
                    </div>
                    <button class="delete-btn" onclick="deleteTask('${task.id}')">Delete</button>
                `;
                list.appendChild(li);
            });
        }

        async function addTask() {
            const input = document.getElementById('taskTitle');
            if (!input.value.trim()) return;

            const res = await fetch('/api/tasks', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: input.value })
            });
            
            const data = await res.json();
            if (data.success) {
                input.value = '';
                fetchTasks();
            }
        }

        async function toggleTask(id) {
            await fetch('/api/tasks/toggle', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id })
            });
            fetchTasks();
        }

        async function deleteTask(id) {
            await fetch('/api/tasks/delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id })
            });
            fetchTasks();
        }
    </script>
</body>
</html>
