<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soldier Management System</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 30px; background-color: #f4f6f8; }
    h1 { color: #2c3e50; }
    .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    form { display: flex; gap: 10px; margin-bottom: 20px; }
    input, select, button { padding: 8px 12px; font-size: 14px; }
    button { background: #27ae60; color: white; border: none; cursor: pointer; border-radius: 4px; }
    button:hover { background: #219150; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    th { background-color: #2c3e50; color: white; }
    .btn-delete { background: #e74c3c; padding: 4px 8px; font-size: 12px; }
    .btn-delete:hover { background: #c0392b; }
  </style>
</head>
<body>
  <div class="container">
    {{ body }}
  </div>
</body>
</html>
