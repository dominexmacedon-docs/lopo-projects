<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        body { font-family: sans-serif; padding: 2rem; background: #fafafa; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .logout-btn { display: inline-block; padding: 10px 20px; background: #DC3545; color: white; text-decoration: none; border-radius: 4px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome back, {{ username }}!</h1>
        <p>You have successfully authenticated via secure browser cookie tokens.</p>
        <a href="/logout" class="logout-btn">Terminate Session</a>
    </div>
</body>
</html>
