<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Lopo Quiz</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f3; margin: 40px; }
    .card { max-width: 650px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    h1 { color: #2c3e50; text-align: center; margin-bottom: 25px; }
    .question-block { margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-left: 4px solid #3498db; border-radius: 4px; }
    .question-title { font-weight: bold; margin-bottom: 10px; color: #34495e; }
    label { display: block; margin: 6px 0; cursor: pointer; }
    button { width: 100%; background: #27ae60; color: white; padding: 12px; border: none; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 15px; }
    button:hover { background: #219150; }
    .score-box { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; padding: 20px; text-align: center; border-radius: 6px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="card">
    {{ body }}
  </div>
</body>
</html>
