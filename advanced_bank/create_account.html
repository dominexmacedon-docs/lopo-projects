<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ title }}</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 30px auto; padding: 0 20px; background-color: #f1f5f9; }
    nav { display: flex; gap: 12px; background: #0f172a; padding: 15px 20px; border-radius: 8px; margin-bottom: 25px; }
    nav a { color: #f8fafc; text-decoration: none; font-weight: 600; }
    form { background: #fff; padding: 25px; border-radius: 8px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; gap: 15px; }
    input, select, button { padding: 10px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 1rem; }
    button { background: #0284c7; color: white; border: none; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>

  <nav>
    <a href="/">← Return to Dashboard</a>
  </nav>

  <h1>Open New Bank Account</h1>

  <form action="/create-account" method="POST">
    <label>Account Holder Full Name</label>
    <input type="text" name="holderName" placeholder="e.g. John Doe" required />

    <label>Account Category</label>
    <select name="accountType" required>
      <option value="Checking">Checking (With Overdraft)</option>
      <option value="Savings">Savings (High Yield)</option>
      <option value="Investment">Investment Vault</option>
    </select>

    <label>Opening Principal Deposit ($)</label>
    <input type="number" step="0.01" name="initialDeposit" placeholder="500.00" required />

    <label>Standard Annual Interest Rate (%)</label>
    <input type="number" step="0.01" name="interestRate" value="2.5" required />

    <button type="submit">Provision Account & Create Ledger</button>
  </form>

</body>
</html>
