<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ title }}</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 30px auto; padding: 0 20px; background-color: #f1f5f9; }
    nav { display: flex; gap: 12px; background: #0f172a; padding: 15px 20px; border-radius: 8px; margin-bottom: 25px; }
    nav a { color: #f8fafc; text-decoration: none; font-weight: 600; }
    form { background: #fff; padding: 25px; border-radius: 8px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; gap: 15px; }
    input, select, button { padding: 10px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 1rem; }
    button { background: #16a34a; color: white; border: none; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>

  <nav>
    <a href="/">← Return to Dashboard</a>
  </nav>

  <h1>Inter-Bank Wire Transfer</h1>

  <form action="/process-transfer" method="POST">
    <label>Originating Source Account</label>
    <select name="senderAccount" required>
      {{ sourceOptionsHtml }}
    </select>

    <label>Destination Target Account</label>
    <select name="recipientAccount" required>
      {{ targetOptionsHtml }}
    </select>

    <label>Transfer Principal Amount ($)</label>
    <input type="number" step="0.01" name="amount" placeholder="0.00" required />

    <label>Include Wire Processing Fee ($15.00)</label>
    <select name="includeWireFee">
      <option value="YES">Yes - Express Clearing Fee ($15)</option>
      <option value="NO">No - Standard Clearing ($0)</option>
    </select>

    <button type="submit">Execute Transfer Calculation</button>
  </form>

</body>
</html>
