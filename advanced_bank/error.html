<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ title }}</title>
  <style>
    body { font-family: system-ui, sans-serif; text-align: center; padding: 60px 20px; background-color: #f1f5f9; }
    .card { max-width: 450px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; border: 1px solid #fecaca; }
    h2 { color: #dc2626; }
    a { display: inline-block; margin-top: 15px; color: #0284c7; font-weight: bold; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Operation Denied</h2>
    <p>{{ errorMessage }}</p>
    <a href="/">Return to Banking Dashboard</a>
  </div>
</body>
</html>
