<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ title }}</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 1000px; margin: 30px auto; padding: 0 20px; background-color: #f1f5f9; }
    nav { display: flex; gap: 12px; background: #0f172a; padding: 15px 20px; border-radius: 8px; margin-bottom: 25px; }
    nav a { color: #f8fafc; text-decoration: none; font-weight: 600; }
    .grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
    form { background: #fff; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; gap: 12px; }
    input, button { padding: 8px; border-radius: 4px; border: 1px solid #cbd5e1; }
    button { background: #0f172a; color: white; font-weight: bold; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; border: 1px solid #e2e8f0; }
    th, td { padding: 10px; border-bottom: 1px solid #e2e8f0; text-align: left; }
    th { background: #f8fafc; }
  </style>
</head>
<body>

  <nav>
    <a href="/">Dashboard</a>
    <a href="/loans">Loans</a>
    <a href="/interest-calculator">Yield Forecast</a>
  </nav>

  <h1>Loan Amortization & Portfolio Management</h1>

  <div class="grid">
    <div>
      <h3>Calculate & Issue Loan</h3>
      <form action="/calculate-loan" method="POST">
        <label>Borrower Name</label>
        <input type="text" name="borrowerName" required />

        <label>Principal Amount ($)</label>
        <input type="number" step="0.01" name="principal" required />

        <label>Annual Interest Rate (%)</label>
        <input type="number" step="0.01" name="annualRate" value="6.5" required />

        <label>Term Duration (Months)</label>
        <input type="number" name="termMonths" value="36" required />

        <button type="submit">Compute Amortization</button>
      </form>
    </div>

    <div>
      <h3>Active Credit Portfolio</h3>
      <table>
        <thead>
          <tr>
            <th>Loan ID</th>
            <th>Borrower</th>
            <th>Principal</th>
            <th>Rate</th>
            <th>Term</th>
            <th>Monthly Payment</th>
            <th>Balance</th>
          </tr>
        </thead>
        <tbody>
          {{ loanRowsHtml }}
        </tbody>
      </table>
    </div>
  </div>

</body>
</html>
