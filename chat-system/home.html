<!DOCTYPE html>
<html>
<head>
    <title>Lopo Chat - Home</title>
    <style>
        body { 
            font-family: serif; 
            background: #ffffff; 
            color: #000000; 
            margin: 20px; 
        }
    </style>
</head>
<body>
    <table width="100%" border="0" cellpadding="0" cellspacing="0">
        <tr>
            <td>Logged in as: <strong>{{ currentUser }}</strong></td>
            <td align="right">
                <a href="/search">[ Find Users ]</a>
            </td>
        </tr>
    </table>

    <hr size="1" color="#000000" noshade />

    <h2>Available Conversations</h2>

    <table width="100%" border="1" cellpadding="5" cellspacing="0">
        <thead>
            <tr bgcolor="#e0e0e0">
                <th align="left">Name</th>
                <th align="left">Email Target Address</th>
                <th align="left">Action</th>
            </tr>
        </thead>
        <tbody>
            {{ userRows }}
        </tbody>
    </table>

</body>
</html>
