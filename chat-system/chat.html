<!DOCTYPE html>
<html>
<head>
    <title>Chat Window</title>
    <style>
        body { 
            font-family: serif; 
            background: #ffffff; 
            color: #000000; 
            margin: 20px; 
        }
        .chat-container {
            width: 500px;
            border: 2px solid #000000;
        }
        .header { 
            background: #000080; 
            color: #ffffff; 
            padding: 5px;
            font-weight: bold;
        }
        .header a {
            color: #ffffff;
            float: right;
        }
        .timeline { 
            height: 350px; 
            overflow-y: scroll; 
            background: #ffffff; 
            padding: 10px;
            border-bottom: 2px solid #000000;
        }
        .msg {
            margin-bottom: 8px;
            font-size: 14px;
        }
        .msg-sender { 
            color: #0000ff;
        }
        .msg-receiver { 
            color: #800000;
        }
        .input-area { 
            background: #d4d0c8; 
            padding: 10px; 
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="header">
            Room: {{ targetReceiver }}
            <a href="/home">[Close X]</a>
        </div>
        <div class="timeline" id="timeline">
            {{ conversationTimeline }}
        </div>
        
        <div class="input-area">
            <form action="/send" method="POST">
                <input type="hidden" name="receiver" value="{{ targetReceiver }}" />
                <table width="100%" border="0" cellpadding="0" cellspacing="0">
                    <tr>
                        <td>
                            <input type="text" name="message" size="45" autocomplete="off" autofocus required />
                        </td>
                        <td align="right">
                            <input type="submit" value="Send Message" />
                        </td>
                    </tr>
                </table>
            </form>
        </div>
    </div>

    <script>
        var timeline = document.getElementById('timeline');
        timeline.scrollTop = timeline.scrollHeight;
    </script>
</body>
</html>
