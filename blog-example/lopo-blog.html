<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Collaborative Blog Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@unocss/runtime"></script>
    <style>
        .blog-bg {
            background-color: #0b0f19;
            background-image: linear-gradient(to right, rgba(24, 32, 51, 0.4) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(24, 32, 51, 0.4) 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
</head>
<body class="blog-bg min-h-screen text-slate-200 font-sans p-6">

    <header class="max-w-6xl mx-auto mb-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-6 bg-slate-900/80 backdrop-blur-md p-8 rounded-2xl border border-slate-800 shadow-2xl">
        <div>
            <div class="flex items-center gap-3 mb-2">
                <span class="bg-indigo-500/10 text-indigo-400 text-xs font-bold px-2.5 py-1 rounded-full border border-indigo-500/20 uppercase tracking-widest">Workspace Engine</span>
                <span class="bg-emerald-500/10 text-emerald-400 text-xs font-mono px-2 py-0.5 rounded-full border border-emerald-500/20">
                    Live Readers: <span id="liveCounter">1</span>
                </span>
            </div>
            <h1 class="text-4xl font-black tracking-tight text-white">Dynamic Engineering Blog</h1>
        </div>
        
        <div class="flex items-center gap-2 text-sm text-slate-400 font-mono bg-slate-950/60 px-4 py-2 rounded-xl border border-slate-800">
            Total Seeded Items: <span class="text-indigo-400 font-bold">{{ totalPosts }}</span>
        </div>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <section class="lg:col-span-1 bg-slate-900/50 p-6 rounded-2xl border border-slate-800/80 h-fit sticky top-6">
            <h2 class="text-xl font-bold text-white mb-4 flex items-center gap-2">
                Compose Entry
            </h2>
            <div class="flex flex-col gap-4">
                <div>
                    <label class="text-xs font-bold tracking-wider text-slate-400 uppercase block mb-1.5">Author Handle</label>
                    <input type="text" id="postAuthor" placeholder="@developer_alias" class="w-full bg-slate-950 border border-slate-800 px-4 py-2.5 rounded-xl text-sm text-white placeholder-slate-600 focus:outline-none focus:border-indigo-500 transition">
                </div>
                <div>
                    <label class="text-xs font-bold tracking-wider text-slate-400 uppercase block mb-1.5">Article Title</label>
                    <input type="text" id="postTitle" placeholder="Architecting Realtime Pipelines..." class="w-full bg-slate-950 border border-slate-800 px-4 py-2.5 rounded-xl text-sm text-white placeholder-slate-600 focus:outline-none focus:border-indigo-500 transition">
                </div>
                <div>
                    <label class="text-xs font-bold tracking-wider text-slate-400 uppercase block mb-1.5">Category Tag</label>
                    <input type="text" id="postCategory" placeholder="Backend, Systems, Web3..." class="w-full bg-slate-950 border border-slate-800 px-4 py-2.5 rounded-xl text-sm text-white placeholder-slate-600 focus:outline-none focus:border-indigo-500 transition">
                </div>
                <div>
                    <label class="text-xs font-bold tracking-wider text-slate-400 uppercase block mb-1.5">Summary Excerpt</label>
                    <input type="text" id="postSummary" placeholder="Brief outline catchphrase..." class="w-full bg-slate-950 border border-slate-800 px-4 py-2.5 rounded-xl text-sm text-white placeholder-slate-600 focus:outline-none focus:border-indigo-500 transition">
                </div>
                <div>
                    <label class="text-xs font-bold tracking-wider text-slate-400 uppercase block mb-1.5">Document Markdown Content</label>
                    <textarea id="postContent" placeholder="Write comprehensive narrative blocks here..." class="w-full bg-slate-950 border border-slate-800 px-4 py-3 rounded-xl text-sm text-white placeholder-slate-600 focus:outline-none focus:border-indigo-500 h-36 resize-none transition"></textarea>
                </div>
                <button onclick="publishArticle()" class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-400 hover:to-purple-500 text-white font-bold py-3 rounded-xl text-sm shadow-xl shadow-indigo-500/10 active:scale-98 transition transform">
                    Deploy Publication
                </button>
            </div>
        </section>

        <section class="lg:col-span-2">
            <div id="blogFeedStream" class="flex flex-col gap-6"></div>
        </section>
        
    </main>

    <script>
        let ws;

        function initWebSocket() {
            const proto = window.location.protocol === "https:" ? "wss:" : "ws:";
            ws = new WebSocket(`${proto}//${window.location.host}`);
            
            ws.onmessage = (event) => {
                const packet = JSON.parse(event.data);
                if (packet.event === "reader_count") {
                    document.getElementById('liveCounter').innerText = packet.count;
                } else if (packet.event === "content_mutation") {
                    fetchAndRenderFeed();
                }
            };
            
            ws.onclose = () => {
                setTimeout(initWebSocket, 3000);
            };
        }

        async function fetchAndRenderFeed() {
            try {
                const res = await fetch('/api/posts');
                const collection = await res.json();
                const element = document.getElementById('blogFeedStream');
                element.innerHTML = '';
                
                if(collection.length === 0) {
                    element.innerHTML = `
                        <div class="p-12 border border-dashed border-slate-800 text-center rounded-2xl bg-slate-900/20">
                            <p class="text-slate-500 text-sm">No engineering documents deployed to cluster workspace node yet.</p>
                        </div>
                    `;
                    return;
                }

                collection.forEach(item => {
                    const block = document.createElement('article');
                    block.className = "bg-slate-900/40 border border-slate-800/80 p-6 rounded-2xl hover:border-slate-700 shadow-lg flex flex-col justify-between transition group duration-200";
                    block.innerHTML = `
                        <div>
                            <div class="flex justify-between items-center gap-2 mb-3">
                                <span class="bg-indigo-500/10 text-indigo-400 text-xs font-mono font-bold px-2.5 py-0.5 rounded-md border border-indigo-500/20">
                                    ${escapeHtml(item.category || 'General')}
                                </span>
                                <button onclick="terminateArticle('${item.id}')" class="text-slate-600 hover:text-red-400 p-1 rounded transition opacity-0 group-hover:opacity-100 focus:opacity-100">
                                    Remove
                                </button>
                            </div>
                            <h2 class="text-2xl font-bold text-white mb-2 tracking-tight group-hover:text-indigo-300 transition">
                                ${escapeHtml(item.title)}
                            </h2>
                            <p class="text-slate-400 text-sm mb-4 leading-relaxed italic border-l-2 border-slate-700 pl-3">
                                ${escapeHtml(item.summary || '')}
                            </p>
                            <p class="text-slate-300 text-sm font-light leading-relaxed whitespace-pre-wrap mb-6">
                                ${escapeHtml(item.content)}
                            </p>
                        </div>
                        <div class="flex items-center justify-between border-t border-slate-800/60 pt-4 text-xs font-mono text-slate-500">
                            <span>Author: <strong class="text-slate-400">@${escapeHtml(item.author)}</strong></span>
                            <span>${new Date(item.createdAt).toLocaleDateString([], {month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit'})}</span>
                        </div>
                    `;
                    element.appendChild(block);
                });
            } catch (err) {
                console.error("Feed aggregation pipeline interrupt:", err);
            }
        }

        async function publishArticle() {
            const authorEl = document.getElementById('postAuthor');
            const titleEl = document.getElementById('postTitle');
            const catEl = document.getElementById('postCategory');
            const sumEl = document.getElementById('postSummary');
            const contentEl = document.getElementById('postContent');

            if (!authorEl.value.trim() || !titleEl.value.trim() || !contentEl.value.trim()) {
                alert("Please fill in Author, Title, and Document Content fields.");
                return;
            }

            const bodyPayload = {
                author: authorEl.value.trim(),
                title: titleEl.value.trim(),
                category: catEl.value.trim(),
                summary: sumEl.value.trim(),
                content: contentEl.value.trim()
            };

            try {
                const response = await fetch('/api/posts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyPayload)
                });
                const confirmation = await response.json();
                if(confirmation.success) {
                    titleEl.value = '';
                    catEl.value = '';
                    sumEl.value = '';
                    contentEl.value = '';
                    fetchAndRenderFeed();
                    if(ws && ws.readyState === WebSocket.OPEN) {
                        ws.send("mutation_write");
                    }
                }
            } catch(err) {
                console.error("Failed deployment write:", err);
            }
        }

        async function terminateArticle(id) {
            if(!confirm("Are you sure you want to completely erase this payload index?")) return;
            try {
                const res = await fetch(`/api/posts/${id}`, { method: 'DELETE' });
                const confirmRes = await res.json();
                if(confirmRes.success) {
                    fetchAndRenderFeed();
                    if(ws && ws.readyState === WebSocket.OPEN) {
                        ws.send("mutation_delete");
                    }
                }
            } catch(err) {
                console.error("Failed item erase routing:", err);
            }
        }

        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        window.addEventListener('DOMContentLoaded', () => {
            fetchAndRenderFeed();
            initWebSocket();
        });
    </script>
</body>
</html>
