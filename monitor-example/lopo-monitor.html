<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lopo Telemetry Matrix</title>
    <style>
        body { font-family: monospace; background: #0d0e12; color: #00ff66; margin: 0; padding: 2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-top: 2rem; }
        .card { background: #161920; border: 1px solid #242b35; padding: 1.5rem; border-radius: 6px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .card h3 { color: #8892b0; margin: 0 0 10px 0; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .card .value { font-size: 1.8rem; font-weight: bold; }
        h1 { font-size: 1.4rem; color: #fff; margin: 0; }
        .status-badge { display: inline-block; padding: 4px 8px; font-size: 0.75rem; background: rgba(0, 255, 102, 0.1); border-radius: 4px; border: 1px solid #00ff66; margin-top: 5px; }
        .console-log { width: 100%; background: #000; height: 150px; margin-top: 20px; border-radius: 4px; border: 1px solid #242b35; padding: 10px; box-sizing: border-box; overflow-y: auto; font-size: 0.8rem; color: #00ff66; }
    </style>
</head>
<body>

    <div>
        <h1>LOPO ENGINE INTERPRETER TELEMETRY</h1>
        <div id="sysStatus" class="status-badge">SYSTEM CONNECTING...</div>
    </div>

    <div class="grid">
        <div class="card">
            <h3>Active Cookie Sessions</h3>
            <div class="value" id="activeSessions">-</div>
        </div>
        <div class="card">
            <h3>Total Database Records</h3>
            <div class="value" id="totalTasks">-</div>
        </div>
        <div class="card">
            <h3>Task Completion Status</h3>
            <div class="value" id="completionRate">-%</div>
        </div>
        <div class="card">
            <h3>Evaluator Overhead Load</h3>
            <div class="value" id="engineLoad">-</div>
        </div>
    </div>

    <h3>System Stream</h3>
    <div class="console-log" id="consoleLog"></div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            updateMetrics();
            setInterval(updateMetrics, 3000); 
        });

        async function updateMetrics() {
            try {
                const res = await fetch('/api/metrics');
                const data = await res.json();

                document.getElementById('sysStatus').innerText = `SYSTEM STATUS: ${data.status.toUpperCase()}`;
                document.getElementById('activeSessions').innerText = data.active_sessions;
                document.getElementById('totalTasks').innerText = data.database_metrics.total_tasks;
                document.getElementById('completionRate').innerText = `${Math.round(data.database_metrics.completion_rate)}%`;
                document.getElementById('engineLoad').innerText = data.engine_load;

                logEvent(`Telemetry update parsed successfully. Epoch: ${data.uptime_seconds}`);
            } catch (err) {
                document.getElementById('sysStatus').innerText = 'SYSTEM STATUS: DISCONNECTED';
                logEvent('Error: Connection lost to Lopo daemon interpreter.');
            }
        }

        function logEvent(msg) {
            const consoleLog = document.getElementById('consoleLog');
            const now = new Date().toLocaleTimeString();
            consoleLog.innerHTML += `[${now}] ${msg}<br>`;
            consoleLog.scrollTop = consoleLog.scrollHeight;
        }
    </script>
</body>
</html>
